name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ML dependencies
        run: pip install torch>=2.0.0 numpy>=1.24.0 pandas>=2.0.0 scikit-learn>=1.3.0
      - name: Run alarm normaliser tests
        working-directory: alarm_normalizer
        run: python tests/test_pipeline.py
      - name: Run fiber cascade demo
        working-directory: alarm_normalizer
        run: python demo/run_demo.py --scenario fiber
      - name: Run SIMBA tests
        working-directory: simba_pipeline
        run: python tests/test_simba.py
