name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run tests
        working-directory: alarm_normalizer
        run: python tests/test_pipeline.py
      - name: Run fiber cascade demo
        working-directory: alarm_normalizer
        run: python demo/run_demo.py --scenario fiber
